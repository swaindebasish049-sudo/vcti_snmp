spring.application.name=ems

# --- SNMP trap receiver ---
# UDP port the app listens on for inbound traps/informs (162 is privileged; 1162 avoids that).
ems.trap.port=1162

# v3 trap user: the USM identity the app will accept authenticated/encrypted traps & informs from.
# Leave ems.trap.v3.username blank to disable v3 (v1/v2c still work). Passwords must be >= 8 chars.
ems.trap.v3.username=trapuser
ems.trap.v3.auth-protocol=SHA
ems.trap.v3.auth-password=authpass123
ems.trap.v3.priv-protocol=AES128
ems.trap.v3.priv-password=privpass123
